# SwiftLint Configuration — vibecoded with Claude Code
# Strict rules for complexity, length, and code quality

disabled_rules:
  - trailing_whitespace
  - multiple_closures_with_trailing_closure
  - closure_parameter_position
  # opening_brace disabled: conflicts with SwiftFormat brace placement
  - opening_brace

opt_in_rules:
  # Code quality
  - empty_count
  - explicit_init
  - first_where
  - last_where
  # modifier_order removed: conflicts with SwiftFormat modifier ordering
  - redundant_nil_coalescing
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument
  - contains_over_first_not_nil
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_range_nil_comparison
  - flatmap_over_map_reduce
  - reduce_boolean
  - reduce_into
  - direct_return
  - identical_operands
  # no_empty_block removed: produces false positives for standard Swift patterns
  # (empty init(), no-op closures, SwiftUI preview callbacks)
  - sorted_imports
  - yoda_condition
  - prefer_key_path
  - superfluous_else
  - shorthand_optional_binding
  - self_binding

  # Documentation
  - missing_docs

  # Safety
  - unowned_variable_capture
  - overridden_super_call
  - prohibited_super_call
  - fatal_error_message
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - force_unwrapping
  # implicitly_unwrapped_optional: replaced by custom rule scoped to Sources only
  - weak_delegate
  - discarded_notification_center_observer
  - return_value_from_void_function
  # Concurrency
  # async_without_await: removed — protocol conformance legitimately requires async
  # on synchronous implementations (e.g. AppleCalendarAPIService conforming to
  # CalendarAPIProviding). SwiftLint cannot exclude protocol conformance cases.
  - unhandled_throwing_task

  # SwiftUI specific
  - private_swiftui_state
  - accessibility_trait_for_button

  # Code style
  - closure_end_indentation
  - closure_spacing
  - closure_body_length
  - operator_usage_whitespace
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  # vertical_whitespace_between_cases: disabled — conflicts with SwiftFormat's
  # blankLineAfterSwitchCase rule for single-expression cases. Multi-line cases
  # already get blank lines via SwiftFormat's blankLineAfterSwitchCase.
  - number_separator
  - shorthand_operator
  - toggle_bool
  - joined_default_parameter
  - redundant_type_annotation
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - period_spacing

  # Test quality - catch shallow/empty tests
  - empty_xctest_method
  - final_test_case
  - balanced_xctest_lifecycle
  - single_test_class
  - test_case_accessibility
  - xct_specific_matcher

  # Unused code
  - unused_parameter
  - unneeded_throws_rethrows
  - convenience_type

# Analyzer rules (requires --analyze flag)
analyzer_rules:
  - unused_import
  - unused_declaration
  - capture_variable

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - Package.swift
  - Pods
  - Carthage
  - DerivedData

# -------------------------------------------------------------------
# STRICT LENGTH & COMPLEXITY THRESHOLDS
# -------------------------------------------------------------------

line_length:
  warning: 120
  error: 120
  ignores_urls: true
  ignores_function_declarations: false
  ignores_comments: false
  ignores_interpolated_strings: true

file_length:
  warning: 500
  error: 500
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 80

type_body_length:
  warning: 500
  error: 500

closure_body_length:
  warning: 100
  error: 100

cyclomatic_complexity:
  warning: 12
  error: 12
  ignores_case_statements: false

nesting:
  type_level:
    warning: 2
    error: 2
  function_level:
    warning: 3
    error: 3

large_tuple:
  warning: 4
  error: 4

# -------------------------------------------------------------------
# NAMING
# -------------------------------------------------------------------

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 60
  excluded:
    - i
    - j
    - t
    - x
    - y
    - z
    - id
    - ok
    - to
    - db
    - vc
    - up

type_name:
  min_length: 3
  max_length:
    error: 60

# -------------------------------------------------------------------
# RULE CONFIGURATIONS
# -------------------------------------------------------------------

trailing_comma:
  mandatory_comma: true

number_separator:
  minimum_length: 5
  severity: error

force_unwrapping:
  severity: error

# implicitly_unwrapped_optional: disabled in favor of custom rule below that
# excludes test files — IUO is the standard XCTest setUp/tearDown pattern.

xct_specific_matcher:
  severity: error

missing_docs:
  error:
    - open
    - public
  excludes_extensions: true
  excludes_inherited_types: true
  excludes_trivial_init: true

deployment_target:
  macOS_deployment_target: '14.0'

# -------------------------------------------------------------------
# CUSTOM RULES
# -------------------------------------------------------------------

custom_rules:
  no_real_overlay_manager_in_tests:
    name: "No Real OverlayManager in Tests"
    included: "Tests/.*\\.swift"
    regex: "\\bOverlayManager\\b"
    message: "Tests must use TestSafeOverlayManager instead of OverlayManager to prevent fullscreen UI."
    severity: error

  no_real_appstate_in_tests:
    name: "No Real AppState in Tests"
    included: "Tests/.*\\.swift"
    regex: "AppState\\(\\)"
    message: "Tests must not instantiate AppState() directly — it creates a real OverlayManager that blocks the screen. Inject dependencies instead."
    severity: error

  no_assert_not_nil_without_unwrap:
    name: "No Bare XCTAssertNotNil"
    included: "Tests/.*\\.swift"
    regex: "XCTAssertNotNil\\([^)]+\\)\\s*$"
    message: "XCTAssertNotNil alone is shallow. Use XCTUnwrap + assert the value, or assert a specific property."
    severity: error

  no_assert_true_contains:
    name: "No XCTAssertTrue with .contains"
    included: "Tests/.*\\.swift"
    regex: "XCTAssertTrue\\([^)]*\\.contains\\("
    message: "Use XCTAssertEqual or XCTAssert with a specific matcher instead of XCTAssertTrue(.contains(...))."
    severity: error

  no_type_check_assertions:
    name: "No Type-Only Assertions"
    included: "Tests/.*\\.swift"
    regex: "XCTAssert(True|Equal)\\([^,\"]*\\b(is [A-Z]|typeof |type\\(of:)"
    message: "Asserting type alone is shallow. Assert behavior or specific values."
    severity: error

  no_implicitly_unwrapped_optional_in_sources:
    name: "No IUO in Production Code"
    included: "Sources/.*\\.swift"
    regex: ":\\s*\\w+!"
    message: "Implicitly unwrapped optionals are not allowed in production code. Use optional (?) instead."
    severity: error

  no_debug_print_in_tests:
    name: "No Debug Prints in Tests"
    included: "Tests/.*\\.swift"
    regex: "print\\(\"[Dd][Ee][Bb][Uu][Gg]"
    message: "Remove debug print statements from tests. Use XCTAssert to verify values instead."
    severity: error

  no_nsapplication_in_tests:
    name: "No NSApplication in Tests"
    included: "Tests/.*\\.swift"
    regex: "NSApplication\\.shared"
    message: "Tests must not interact with the real window server. Mock the window layer or test at a lower level."
    severity: error

  no_raw_task_sleep_in_tests:
    name: "No Raw Task.sleep in Tests"
    included: "Tests/.*\\.swift"
    regex: "Task\\.sleep\\("
    message: "Use TestUtilities.waitForAsync instead of raw Task.sleep. Bare sleeps cause flaky tests."
    severity: error

  no_emoji_in_test_output:
    name: "No Emoji in Test Output"
    included: "Tests/.*\\.swift"
    regex: "[\\x{1F300}-\\x{1F9FF}\\x{2600}-\\x{27BF}\\x{FE00}-\\x{FE0F}\\x{1FA00}-\\x{1FA6F}\\x{1FA70}-\\x{1FAFF}\\x{2702}-\\x{27B0}]"
    message: "Remove emoji from test files. They are noise that obscures intent."
    severity: error

  no_empty_comments:
    name: "No Empty Comments"
    regex: "^\\s*//\\s*$"
    message: "Empty comments are noise. Write a meaningful comment or remove it."
    severity: error
