# SwiftLint Configuration - Strict rules for vibecoded project
# Zero tolerance for complexity, length, and shallow code

disabled_rules:
  - trailing_whitespace
  - multiple_closures_with_trailing_closure
  - closure_parameter_position
  # opening_brace disabled: conflicts with SwiftFormat brace placement
  - opening_brace

opt_in_rules:
  # Code quality
  - empty_count
  - explicit_init
  - first_where
  - last_where
  # modifier_order removed: conflicts with SwiftFormat modifier ordering
  - redundant_nil_coalescing
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument
  - contains_over_first_not_nil
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_range_nil_comparison
  - flatmap_over_map_reduce
  - reduce_boolean
  - reduce_into
  - direct_return
  - identical_operands
  # no_empty_block removed: produces false positives for standard Swift patterns
  # (empty init(), no-op closures, SwiftUI preview callbacks)
  - sorted_imports
  - yoda_condition
  - prefer_key_path
  - superfluous_else
  - shorthand_optional_binding
  - self_binding

  # Safety
  - unowned_variable_capture
  - overridden_super_call
  - prohibited_super_call
  - fatal_error_message
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - force_unwrapping
  - implicitly_unwrapped_optional
  - weak_delegate
  - discarded_notification_center_observer
  - return_value_from_void_function
  - capture_variable

  # Concurrency
  - async_without_await
  - unhandled_throwing_task

  # SwiftUI specific
  - private_swiftui_state
  - accessibility_trait_for_button

  # Code style
  - closure_end_indentation
  - closure_spacing
  - closure_body_length
  - operator_usage_whitespace
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  # vertical_whitespace_between_cases: disabled — conflicts with SwiftFormat's
  # blankLineAfterSwitchCase rule for single-expression cases. Multi-line cases
  # already get blank lines via SwiftFormat's blankLineAfterSwitchCase.
  - number_separator
  - shorthand_operator
  - toggle_bool
  - joined_default_parameter
  - redundant_type_annotation
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - period_spacing

  # Test quality - catch shallow/empty tests
  - empty_xctest_method
  - final_test_case
  - balanced_xctest_lifecycle
  - single_test_class
  - test_case_accessibility
  - xct_specific_matcher

  # Unused code
  - unused_parameter
  - unneeded_throws_rethrows
  - convenience_type

# Analyzer rules (requires --analyze flag)
analyzer_rules:
  - unused_import
  - unused_declaration

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - Package.swift
  - Pods
  - Carthage
  - DerivedData

# -------------------------------------------------------------------
# STRICT LENGTH & COMPLEXITY THRESHOLDS
# -------------------------------------------------------------------

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_function_declarations: false
  ignores_comments: false
  ignores_interpolated_strings: true

file_length:
  warning: 400
  error: 500
  ignore_comment_only_lines: true

function_body_length:
  warning: 40
  error: 80

type_body_length:
  warning: 300
  error: 500

closure_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 8
  error: 12
  ignores_case_statements: false

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

large_tuple:
  warning: 3
  error: 4

# -------------------------------------------------------------------
# NAMING
# -------------------------------------------------------------------

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - i
    - j
    - t
    - x
    - y
    - z
    - id
    - ok
    - to
    - db
    - vc
    - up

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

# -------------------------------------------------------------------
# RULE CONFIGURATIONS
# -------------------------------------------------------------------

trailing_comma:
  mandatory_comma: true

number_separator:
  minimum_length: 5

force_unwrapping:
  severity: error

implicitly_unwrapped_optional:
  severity: warning
  mode: all_except_iboutlets

xct_specific_matcher:
  severity: warning

deployment_target:
  macOS_deployment_target: '14.0'

# -------------------------------------------------------------------
# CUSTOM RULES
# -------------------------------------------------------------------

custom_rules:
  no_real_overlay_manager_in_tests:
    name: "No Real OverlayManager in Tests"
    included: "Tests/.*\\.swift"
    regex: "\\bOverlayManager\\b"
    message: "Tests must use TestSafeOverlayManager instead of OverlayManager to prevent fullscreen UI."
    severity: error

  no_assert_not_nil_without_unwrap:
    name: "No Bare XCTAssertNotNil"
    included: "Tests/.*\\.swift"
    regex: "XCTAssertNotNil\\([^)]+\\)\\s*$"
    message: "XCTAssertNotNil alone is shallow. Use XCTUnwrap + assert the value, or assert a specific property."
    severity: warning

  no_assert_true_contains:
    name: "No XCTAssertTrue with .contains"
    included: "Tests/.*\\.swift"
    regex: "XCTAssertTrue\\([^)]*\\.contains\\("
    message: "Use XCTAssertEqual or XCTAssert with a specific matcher instead of XCTAssertTrue(.contains(...))."
    severity: warning

  no_type_check_assertions:
    name: "No Type-Only Assertions"
    included: "Tests/.*\\.swift"
    regex: "XCTAssert(True|Equal)\\([^)]*\\b(is |typeof |type\\(of:)"
    message: "Asserting type alone is shallow. Assert behavior or specific values."
    severity: warning
