name: Unmissable
options:
  bundleIdPrefix: com.unmissable
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  developmentLanguage: en
  xcodeVersion: "16.3"

packages:
  AppAuth-iOS:
    url: https://github.com/openid/AppAuth-iOS.git
    from: "2.0.0"
  GRDB.swift:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.10.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"
  Magnet:
    url: https://github.com/Clipy/Magnet.git
    from: "3.4.0"
  MenuBarExtraAccess:
    url: https://github.com/orchetect/MenuBarExtraAccess.git
    from: "1.3.0"
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing.git
    from: "1.19.1"
  swift-clocks:
    url: https://github.com/pointfreeco/swift-clocks.git
    from: "1.0.0"
  swift-concurrency-extras:
    url: https://github.com/pointfreeco/swift-concurrency-extras.git
    from: "1.0.0"

settings:
  base:
    # Enables Swift 6 language mode (strict concurrency).
    # SWIFT_VERSION uses major versions only (6.0 = Swift 6 language mode).
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targetTemplates:
  TestTarget:
    platform: macOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        OTHER_SWIFT_FLAGS:
          - "-enable-upcoming-feature"
          - "InferIsolatedConformances"
          - "-enable-upcoming-feature"
          - "NonisolatedNonsendingByDefault"

targets:
  Unmissable:
    type: application
    platform: macOS
    sources:
      - path: Sources/Unmissable
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unmissable.app
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: Unmissable.entitlements
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_STRICT_CONCURRENCY: complete
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        OTHER_SWIFT_FLAGS:
          - "-Xfrontend"
          - "-default-isolation"
          - "-Xfrontend"
          - "MainActor"
          - "-enable-upcoming-feature"
          - "InferIsolatedConformances"
          - "-enable-upcoming-feature"
          - "NonisolatedNonsendingByDefault"
    dependencies:
      - package: AppAuth-iOS
        product: AppAuth
      - package: GRDB.swift
        product: GRDB
      - package: KeychainAccess
      - package: Magnet
      - package: MenuBarExtraAccess

  UnmissableTests:
    type: bundle.unit-test
    templates:
      - TestTarget
    sources:
      - path: Tests/UnmissableTests
      - path: Tests/TestSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unmissable.UnmissableTests
    dependencies:
      - target: Unmissable
      - package: swift-snapshot-testing
        product: SnapshotTesting
      - package: swift-clocks
        product: Clocks
      - package: swift-concurrency-extras
        product: ConcurrencyExtras

  IntegrationTests:
    type: bundle.unit-test
    templates:
      - TestTarget
    sources:
      - path: Tests/IntegrationTests
      - path: Tests/TestSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unmissable.IntegrationTests
    dependencies:
      - target: Unmissable
      - package: swift-clocks
        product: Clocks
      - package: swift-concurrency-extras
        product: ConcurrencyExtras

  E2ETests:
    type: bundle.unit-test
    templates:
      - TestTarget
    sources:
      - path: Tests/E2ETests
      - path: Tests/TestSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unmissable.E2ETests
    dependencies:
      - target: Unmissable
      - package: swift-clocks
        product: Clocks
      - package: swift-concurrency-extras
        product: ConcurrencyExtras

  SnapshotTests:
    type: bundle.unit-test
    templates:
      - TestTarget
    sources:
      - path: Tests/SnapshotTests
        excludes:
          - "__Snapshots__"
      - path: Tests/TestSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unmissable.SnapshotTests
    dependencies:
      - target: Unmissable
      - package: swift-snapshot-testing
        product: SnapshotTesting
      - package: swift-clocks
        product: Clocks
      - package: swift-concurrency-extras
        product: ConcurrencyExtras

  UnmissableUITests:
    type: bundle.ui-testing
    templates:
      - TestTarget
    sources:
      - path: Tests/UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unmissable.UnmissableUITests
    dependencies:
      - target: Unmissable

schemes:
  Unmissable:
    build:
      targets:
        Unmissable: all
        UnmissableTests: [testing]
        IntegrationTests: [testing]
        E2ETests: [testing]
        SnapshotTests: [testing]
    run:
      executable: Unmissable
    test:
      testPlans:
        - path: TestPlans/Full.xctestplan
          defaultPlan: true
        - path: TestPlans/Fast.xctestplan
        - path: TestPlans/E2E.xctestplan
    archive:
      revealArchiveInOrganizer: true

  UnmissableUITests:
    build:
      targets:
        Unmissable: all
        UnmissableUITests: [testing]
    run:
      executable: Unmissable
    test:
      targets:
        - UnmissableUITests
